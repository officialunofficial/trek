<body>
    <article>
        <h1>Small equation images</h1>

        <p>You can obtain all the elementary functions from just the function</p>
        <p><img class="aligncenter" src="https://example.com/inline-eq.svg" alt="\operatorname{fn}(x,y) = \exp(x) - \log(y)" width="224" height="18"></p>
        <p>and the constant 1. The following equations show how to bootstrap addition and subtraction.</p>
        <p><img class="aligncenter" src="https://example.com/block-eq.svg" alt="\begin{align*} \exp(z) &amp;\mapsto \operatorname{fn}(z,1) \\ \log(z) &amp;\mapsto \operatorname{fn}(1,\exp(\operatorname{fn}(1,z))) \end{align*}" width="264" height="120"></p>
        <p>See the paper for more details.</p>
    </article>
</body>
