	<main>
		<h1>Getting user input</h1>
		<p>Here is a script that collects user data:</p>

		<!-- Code block with hljs syntax highlighting and a header div showing
		     the language label. The header should be stripped from extracted content. -->
		<pre><code class="hljs language-bash"><div class="code__header"><span>bash</span><button class="code__copy-button"><span class="code__copy-icon"></span></button></div><div class="code-content"><span class="hljs-meta">#!/bin/bash</span>

<span class="hljs-comment"># Prompt the user for their name</span>
<span class="hljs-built_in">read</span> -p <span class="hljs-string">"Enter your name: "</span> name

<span class="hljs-comment"># Display the name</span>
<span class="hljs-built_in">echo</span> <span class="hljs-string">"Hello, <span class="hljs-variable">$name</span>"</span>
</div></code></pre>

		<p>This script uses the <code>read</code> command to get input.</p>
