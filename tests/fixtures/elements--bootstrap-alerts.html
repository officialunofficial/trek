<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Bootstrap alerts test</title>
</head>
<body>
  <article>
    <h1>Bootstrap alerts test</h1>

    <p>Here is some content before the alerts.</p>

    <div class="alert alert-info">
      <p class="alert-heading">Important</p>
      <p>This is an informational alert.</p>
    </div>

    <div class="alert alert-warning">
      <p>This is a warning without a title.</p>
    </div>

    <div class="alert alert-danger" role="alert">
      <p class="alert-title">Danger</p>
      <p>Something went wrong.</p>
    </div>

    <div class="alert alert-success">
      <p>Operation completed successfully.</p>
    </div>

    <p>Here is some content after the alerts.</p>
  </article>
</body>
</html>
