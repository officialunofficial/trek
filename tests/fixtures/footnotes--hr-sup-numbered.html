<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Loose footnotes: sup-numbered after hr</title>
</head>
<body>
  <!--
    Pattern: inline <sup>N</sup> references in body, definitions after <hr>
    as <p><sup>N</sup> text</p> — used by pfrazee.com/why-not-p2p style blogs.
  -->
  <article>
    <h1>Loose footnotes: sup-numbered after hr</h1>

    <p>The first technique is widely used.<sup>1</sup></p>

    <p>The second technique has trade-offs.<sup>2</sup></p>

    <p>Both approaches have merit.</p>

    <hr/>

    <p><sup>1</sup> This is the first footnote with more detail about the technique.</p>

    <p><sup>2</sup> This is the second footnote explaining the trade-offs in depth.</p>

  </article>
</body>
</html>
