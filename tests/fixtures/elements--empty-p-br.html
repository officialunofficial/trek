<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Empty paragraph br test</title>
</head>
<body>
  <!--
    Jekyll and similar generators often emit <p><br /></p> as visual spacers
    between sections. These carry no content and should be removed.
  -->
  <article>
    <h1>Empty paragraph br test</h1>

    <p>First section content.</p>

    <p><br /></p>

    <p>Second section content.</p>

    <p><br /></p>

    <p>Third section content.</p>
  </article>
</body>
</html>
